<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ARKA | Admin — User Reviews</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&family=Orbitron:wght@500;700&family=Space+Grotesk:wght@300;400;500;600&family=Space+Mono&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="/static/css/style.css?v=3.2">
    <link rel="stylesheet" href="/static/css/law.css?v=1.0">
    <style>
        body {
            overflow-y: auto;
            padding: 40px 20px;
            background: #050508;
            color: #e8e8ed;
        }

        .admin-container {
            max-width: 1000px;
            margin: 0 auto;
        }

        .review-card {
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 12px;
            padding: 20px;
            margin-bottom: 20px;
            transition: transform 0.2s;
        }

        .review-card:hover {
            transform: translateY(-2px);
            background: rgba(255, 255, 255, 0.05);
            border-color: var(--law-accent);
        }

        .review-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 12px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.05);
            padding-bottom: 10px;
        }

        .review-user {
            font-weight: 600;
            color: var(--law-accent);
        }

        .review-meta {
            font-size: 0.8rem;
            color: #6e6e7a;
            font-family: 'Space Mono', monospace;
        }

        .rating-badge {
            display: inline-flex;
            align-items: center;
            gap: 4px;
            padding: 4px 8px;
            border-radius: 6px;
            font-size: 0.8rem;
            font-weight: 700;
        }

        .rating-badge.high {
            background: rgba(34, 197, 94, 0.15);
            color: #4ade80;
        }

        .rating-badge.low {
            background: rgba(239, 68, 68, 0.15);
            color: #f87171;
        }

        .correct-badge {
            font-size: 0.7rem;
            text-transform: uppercase;
            padding: 2px 6px;
            border-radius: 4px;
            margin-left: 8px;
        }

        .correct-badge.true {
            background: rgba(34, 197, 94, 0.2);
            color: #4ade80;
        }

        .correct-badge.false {
            background: rgba(239, 68, 68, 0.2);
            color: #f87171;
        }

        .chat-context {
            font-style: italic;
            color: #6e6e7a;
            font-size: 0.9rem;
            margin-bottom: 10px;
            display: block;
        }

        .chat-link {
            color: #3b82f6;
            text-decoration: none;
            font-size: 0.85rem;
            display: inline-flex;
            align-items: center;
            gap: 4px;
        }

        .chat-link:hover {
            text-decoration: underline;
        }

        #auth-gate {
            max-width: 400px;
            margin: 100px auto;
            text-align: center;
            padding: 40px;
            background: rgba(255, 255, 255, 0.02);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 20px;
            backdrop-filter: blur(10px);
        }

        input[type="password"] {
            width: 100%;
            padding: 12px;
            background: rgba(0, 0, 0, 0.3);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 8px;
            color: #fff;
            margin-bottom: 20px;
            text-align: center;
        }

        .btn-unlock {
            width: 100%;
            padding: 12px;
            background: var(--law-accent);
            border: none;
            border-radius: 8px;
            color: #fff;
            font-weight: 700;
            cursor: pointer;
        }
    </style>
</head>

<body>
    <div class="bg-grid"></div>

    <div id="auth-gate">
        <h2 style="margin-bottom: 10px; font-family: 'Orbitron'; letter-spacing: 2px;">ADMIN REVIEWS</h2>
        <p style="color: #6e6e7a; margin-bottom: 30px; font-size: 0.9rem;">Protected Area</p>
        <input type="password" id="admin-key" placeholder="Enter Admin Secret">
        <button class="btn-unlock" id="unlock-btn">ACCESS REVIEWS</button>
    </div>

    <div class="admin-container" id="reviews-container" style="display: none;">
        <header style="margin-bottom: 40px; display: flex; justify-content: space-between; align-items: center;">
            <div>
                <h1 style="font-family: 'Orbitron'; font-size: 2rem; color: #fff;">USER <span
                        style="color: var(--law-accent);">FEEDBACK</span></h1>
                <p style="color: #6e6e7a;">Law Bot Reviews and Insights</p>
            </div>
            <a href="/admin-email" class="chat-link" style="color: #6e6e7a;">Go to Email Panel -></a>
        </header>

        <div id="stats" style="display: flex; gap: 20px; margin-bottom: 30px;">
            <div class="review-card" style="flex: 1; text-align: center; margin-bottom: 0;">
                <div style="font-size: 0.8rem; color: #6e6e7a; margin-bottom: 5px;">TOTAL REVIEWS</div>
                <div id="total-count" style="font-size: 2rem; font-weight: 700;">0</div>
            </div>
            <div class="review-card" style="flex: 1; text-align: center; margin-bottom: 0;">
                <div style="font-size: 0.8rem; color: #6e6e7a; margin-bottom: 5px;">AVG RATING</div>
                <div id="avg-rating" style="font-size: 2rem; font-weight: 700; color: #4ade80;">0.0</div>
            </div>
            <div class="review-card" style="flex: 1; text-align: center; margin-bottom: 0;">
                <div style="font-size: 0.8rem; color: #6e6e7a; margin-bottom: 5px;">CORRECTNESS</div>
                <div id="correctness-rate" style="font-size: 2rem; font-weight: 700;">0%</div>
            </div>
        </div>

        <div id="reviews-list">
            <!-- Populated by JS -->
            <div style="text-align: center; padding: 50px; color: #6e6e7a;">Fetching reviews...</div>
        </div>
    </div>

    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js"></script>
    <script src="/static/js/firebase-init.js"></script>

    <script>
        const authGate = document.getElementById('auth-gate');
        const reviewsContainer = document.getElementById('reviews-container');
        const unlockBtn = document.getElementById('unlock-btn');
        const keyInput = document.getElementById('admin-key');

        keyInput.addEventListener('keydown', (e) => { if (e.key === 'Enter') unlockBtn.click(); });

        unlockBtn.addEventListener('click', () => {
            const key = keyInput.value.trim();
            if (key === 'arka-dhruv-2026') {
                authGate.style.display = 'none';
                reviewsContainer.style.display = 'block';
                loadReviews();
            } else {
                alert('Invalid Secret Key');
            }
        });

        async function loadReviews() {
            const list = document.getElementById('reviews-list');
            try {
                const snapshot = await db.ref('law_feedback').once('value');
                const usersData = snapshot.val();
                if (!usersData) {
                    list.innerHTML = '<div style="text-align: center; padding: 50px; color: #6e6e7a;">No reviews found yet.</div>';
                    return;
                }

                let allReviews = [];
                Object.entries(usersData).forEach(([uid, sessions]) => {
                    Object.entries(sessions).forEach(([sid, review]) => {
                        allReviews.push({ ...review, uid, sid });
                    });
                });

                // Sort by newest
                allReviews.sort((a, b) => b.timestamp - a.timestamp);

                // Stats
                const total = allReviews.length;
                const avg = allReviews.reduce((acc, r) => acc + (r.rating || 0), 0) / total;
                const correctCount = allReviews.filter(r => r.correctness === 'correct').length;
                const correctRate = (correctCount / total) * 100;

                document.getElementById('total-count').innerText = total;
                document.getElementById('avg-rating').innerText = avg.toFixed(1);
                document.getElementById('correctness-rate').innerText = correctRate.toFixed(0) + '%';

                list.innerHTML = allReviews.map(r => `
                    <div class="review-card">
                        <div class="review-header">
                            <div>
                                <span class="review-user">${r.userName || 'Anonymous User'}</span>
                                <span class="correct-badge ${r.correctness === 'correct' ? 'true' : 'false'}">${r.correctness}</span>
                            </div>
                            <div class="rating-badge ${r.rating >= 4 ? 'high' : r.rating <= 2 ? 'low' : ''}">
                                ${'★'.repeat(r.rating)}${'☆'.repeat(5 - r.rating)}
                            </div>
                        </div>
                        <span class="chat-context">Context: "${r.chatSnippet || 'No snippet available'}"</span>
                        <p style="margin-bottom: 15px; line-height: 1.6;">${r.comments || '<i style="color: #6e6e7a;">No written feedback provided.</i>'}</p>
                        <div style="display: flex; justify-content: space-between; align-items: center;">
                            <span class="review-meta">${new Date(r.timestamp).toLocaleString()}</span>
                            <a href="/law-bot?uid=${r.uid}&sid=${r.sid}" class="chat-link" target="_blank">
                                <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M18 13v6a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h6"></path><polyline points="15 3 21 3 21 9"></polyline><line x1="10" y1="14" x2="21" y2="3"></line></svg>
                                View Chat Context
                            </a>
                        </div>
                    </div>
                `).join('');

            } catch (e) {
                console.error(e);
                list.innerHTML = '<div style="color: #f87171;">Error loading reviews: ' + e.message + '</div>';
            }
        }
    </script>
</body>

</html>
