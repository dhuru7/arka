    <style>
        /* Specific Admin UI adjustments reusing global variables */
        body {
            overflow-y: auto;
            display: flex;
            align-items: flex-start;
            justify-content: center;
            min-height: 100vh;
        }

        .admin-wrapper {
            width: 100%;
            max-width: 900px;
            margin-top: 60px;
            margin-bottom: 100px;
            padding: 0 24px;
            position: relative;
            z-index: 10;
        }

        .admin-header {
            margin-bottom: 32px;
            text-align: center;
        }

        .admin-header h1 {
            font-family: var(--font-logo);
            font-size: 2.5rem;
            color: var(--fg);
            margin-bottom: 4px;
        }

        .admin-header h1 span {
            color: var(--accent);
        }

        .admin-subtitle {
            color: var(--fg-muted);
            font-size: 0.95rem;
            margin-top: 8px;
            font-family: var(--font-body);
        }

        /* Nav Back */
        .nav-back {
            position: fixed;
            top: 24px;
            left: 24px;
            z-index: 100;
            background: rgba(0, 0, 0, 0.4);
            backdrop-filter: blur(8px);
        }

        /* Glass Panel Box */
        .glass-panel {
            background: rgba(0, 0, 0, 0.4);
            border: 1px solid var(--border);
            border-radius: var(--radius-md);
            padding: 32px;
            backdrop-filter: blur(16px);
            margin-bottom: 24px;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.5);
        }

        /* Auth Gate */
        .auth-gate {
            max-width: 420px;
            margin: 40px auto;
            text-align: center;
        }

        /* Stats */
        .stats-bar {
            display: flex;
            gap: 16px;
            margin-bottom: 24px;
            flex-wrap: wrap;
        }

        .stat-card {
            flex: 1;
            min-width: 140px;
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid var(--border);
            border-radius: var(--radius-sm);
            padding: 20px;
            text-align: center;
        }

        .stat-card .stat-num {
            font-family: var(--font-logo);
            font-size: 2rem;
            color: var(--accent);
            font-weight: 700;
        }

        .stat-card .stat-label {
            font-size: 0.75rem;
            color: var(--fg-muted);
            text-transform: uppercase;
            letter-spacing: 1.5px;
            margin-top: 6px;
        }

        /* Form sections */
        .form-section {
            margin-bottom: 24px;
        }

        .form-section textarea {
            min-height: 250px;
            font-family: var(--font-mono);
            font-size: 0.85rem;
        }

        /* User List Options */
        .user-list-wrapper {
            background: rgba(0, 0, 0, 0.3);
            border: 1px solid var(--border);
            border-radius: var(--radius-sm);
            max-height: 350px;
            overflow-y: auto;
            padding: 8px;
            margin-bottom: 20px;
        }

        .user-list-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 8px 12px;
            border-bottom: 1px solid var(--border);
            margin-bottom: 8px;
            position: sticky;
            top: -8px;
            background: rgba(0, 0, 0, 0.9);
            backdrop-filter: blur(10px);
            z-index: 2;
        }

        .user-list-header label {
            margin: 0;
            font-size: 0.85rem;
            color: var(--fg);
            display: flex;
            align-items: center;
            gap: 8px;
            cursor: pointer;
        }

        .user-item {
            display: flex;
            align-items: center;
            padding: 10px 12px;
            gap: 12px;
            border-radius: 6px;
            transition: background 0.2s;
            border-bottom: 1px solid rgba(255, 255, 255, 0.03);
        }

        .user-item:hover {
            background: rgba(255, 255, 255, 0.05);
        }

        .user-item label {
            margin: 0;
            cursor: pointer;
            font-family: var(--font-body);
            font-size: 0.9rem;
            color: var(--fg);
            flex: 1;
            display: flex;
            flex-direction: column;
            text-transform: none;
            letter-spacing: normal;
        }

        .user-item label span.email {
            font-family: var(--font-mono);
            font-size: 0.8rem;
            color: var(--fg-muted);
            margin-top: 2px;
        }

        /* Custom Checkbox */
        input[type="checkbox"] {
            appearance: none;
            width: 18px;
            height: 18px;
            border: 1px solid var(--border-light);
            border-radius: 4px;
            background: transparent;
            cursor: pointer;
            position: relative;
            transition: all 0.2s;
            flex-shrink: 0;
            outline: none;
        }

        input[type="checkbox"]:checked {
            background: var(--accent);

            content: '';

            top: 2px;
            left: 5px;
            width: 4px;
            height: 8px;
            border: solid white;
            border-width: 0 2px 2px 0;
            transform: rotate(45deg);

    <script>
        // State
        let adminKey = '';
        let allUsersData = []; // To hold mapped user info from DB

        // Setup Template
        function getDefaultEmailHTML(siteUrl) {
            const base = siteUrl || 'https://arka-ai.vercel.app';
            return document.getElementById('email-template-src').value.replace(/\{\{BASE_URL\}\}/g, base);
        }

        // Auth
        const unlockBtn = document.getElementById('btn-unlock');
        const keyInput = document.getElementById('admin-key-input');

        keyInput.addEventListener('keydown', (e) => {
            if (e.key === 'Enter') unlockBtn.click();
        });

        unlockBtn.addEventListener('click', () => {
            adminKey = keyInput.value.trim();
            if (!adminKey) return;

            // Simple display toggle with a specific key check
            if (adminKey === 'arka-dhruv-2026') {
                document.getElementById('auth-gate').style.display = 'none';
                document.getElementById('email-panel').style.display = 'block';

                // Set initial email HTML
                const emailHtmlEl = document.getElementById('email-html');
                if (emailHtmlEl) emailHtmlEl.value = getDefaultEmailHTML();

                // Load Users
                loadUsers();
            } else {
                alert('Invalid Admin Key');
            }
        });

        // Load Users from both 'users' and 'userProfiles' nodes
        async function loadUsers() {
            try {
                // Fetch from both sources in parallel
                const [usersSnapshot, profilesSnapshot] = await Promise.all([
                    db.ref('users').once('value'),
                    db.ref('userProfiles').once('value')
                ]);
                const users = usersSnapshot.val() || {};
                const profiles = profilesSnapshot.val() || {};

                let total = 0, withEmail = 0, anonymous = 0;
                allUsersData = [];
                const emailSet = new Set(); // Track unique emails

                // Helper to extract email from a user data object (may be nested)
                function extractEmail(data) {
                    if (!data || typeof data !== 'object') return null;
                    // Direct email field
                    if (data.email && typeof data.email === 'string' && data.email.includes('@')) return data.email;
                    // Check nested profile/info objects
                    for (const key of Object.keys(data)) {
                        const val = data[key];
                        if (val && typeof val === 'object') {
                            if (val.email && typeof val.email === 'string' && val.email.includes('@')) return val.email;
                        }
                    }
                    return null;
                }

                // Helper to extract display name
                function extractName(data) {
                    if (!data || typeof data !== 'object') return 'Unknown';
                    return data.name || data.displayName || data.userName || 'Unknown';
                }

                // Process users from the main 'users' node
                for (const uid in users) {
                    total++;
                    const user = users[uid];
                    const email = extractEmail(user);
                    if (email) {
                        const emailLower = email.toLowerCase();
                        if (!emailSet.has(emailLower)) {
                            emailSet.add(emailLower);
                            withEmail++;
                            allUsersData.push({
                                id: uid,
                                name: extractName(user),
                                email: email
                            });
                        }
                    } else {
                        anonymous++;
                    }
                }

                // Process users from 'userProfiles' node (Google sign-in users)
                for (const uid in profiles) {
                    const profile = profiles[uid];
                    const email = extractEmail(profile);
                    if (email) {
                        const emailLower = email.toLowerCase();
                        if (!emailSet.has(emailLower)) {
                            emailSet.add(emailLower);
                            withEmail++;
                            if (!users[uid]) total++; // Only increment total if not already counted
                            allUsersData.push({
                                id: uid,
                                name: profile.displayName || profile.name || 'Unknown',
                                email: email
                            });
                        }
                    }
                }

                // Sort by name for easier browsing
                allUsersData.sort((a, b) => a.name.localeCompare(b.name));

                document.getElementById('total-users').textContent = total;
                document.getElementById('email-users').textContent = withEmail;
                document.getElementById('guest-users').textContent = anonymous;

                renderUserList();
            } catch (err) {
                console.error('Failed to load users:', err);
                document.getElementById('user-list-container').innerHTML = `<div style="padding: 16px; color: #ef4444;">Failed to load users: ${err.message}</div>`;
                document.getElementById('total-users').textContent = 'ERR';
            }
        }

        function renderUserList() {
            const listContainer = document.getElementById('user-list-container');
            listContainer.innerHTML = '';

            if (allUsersData.length === 0) {
                listContainer.innerHTML = '<div style="padding: 16px; color: var(--fg-muted);">No users with emails found.</div>';
                return;
            }

            allUsersData.forEach((user, index) => {
                const item = document.createElement('div');
                item.className = 'user-item';

                const checkbox = document.createElement('input');
                checkbox.type = 'checkbox';
                checkbox.className = 'user-checkbox';
                checkbox.value = user.email;
                checkbox.id = `user-${index}`;
                // Default checked based on 'select-all' status
                checkbox.checked = document.getElementById('select-all').checked;

                checkbox.addEventListener('change', updateSelectedCount);

                const label = document.createElement('label');
                label.setAttribute('for', `user-${index}`);

                const nameSpan = document.createElement('span');
                nameSpan.textContent = user.name;

                const emailSpan = document.createElement('span');
                emailSpan.className = 'email';
                emailSpan.textContent = user.email;

                label.appendChild(nameSpan);
                label.appendChild(emailSpan);

                item.appendChild(checkbox);
                item.appendChild(label);

                listContainer.appendChild(item);
            });

            updateSelectedCount();
        }

        // Handle Select All
        const selectAllCheckbox = document.getElementById('select-all');
        selectAllCheckbox.addEventListener('change', (e) => {
            const checked = e.target.checked;
            document.querySelectorAll('.user-checkbox').forEach(cb => {
                cb.checked = checked;
            });
            updateSelectedCount();
        });

        function updateSelectedCount() {
            const count = document.querySelectorAll('.user-checkbox:checked').length;
            document.getElementById('selected-count').textContent = `${count} selected`;

            const totalCheckboxes = document.querySelectorAll('.user-checkbox').length;
            const selectAll = document.getElementById('select-all');

            if (count === 0) {
                selectAll.checked = false;
                selectAll.indeterminate = false;
            } else if (count === totalCheckboxes) {
                selectAll.checked = true;
                selectAll.indeterminate = false;
            } else {
                selectAll.checked = false;
                selectAll.indeterminate = true;
            }
        }

        // Preview
        document.getElementById('btn-preview').addEventListener('click', () => {
            const html = document.getElementById('email-html').value;
            const iframe = document.getElementById('preview-iframe');
            iframe.srcdoc = html;

            const modal = document.getElementById('preview-overlay');
            modal.style.display = 'flex';

            // Allow display change to propagate
            requestAnimationFrame(() => {
                modal.classList.add('active'); // Assume active handles fade-in similar to style.css models
            });
        });

        document.getElementById('preview-close').addEventListener('click', () => {
            const modal = document.getElementById('preview-overlay');
            modal.style.display = 'none';
        });

        document.getElementById('preview-overlay').addEventListener('click', (e) => {
            if (e.target === e.currentTarget) {
                e.target.style.display = 'none';
            }
        });

        // Setup Send
        document.getElementById('btn-send').addEventListener('click', async () => {
            const subject = document.getElementById('email-subject').value.trim();
            const html = document.getElementById('email-html').value.trim();
            const statusEl = document.getElementById('send-status');
            const sendBtn = document.getElementById('btn-send');

            if (!subject || !html) {
                statusEl.className = 'status-banner error';
                statusEl.textContent = '❌ Please fill in both subject and HTML body.';
                return;
            }

            // Get selected user emails
            const selectedEmails = Array.from(document.querySelectorAll('.user-checkbox:checked')).map(cb => cb.value);

            // Get manual emails
            const manualRaw = document.getElementById('manual-emails').value;
            const manualEmails = manualRaw.split(/[\n,]/)
                .map(e => e.trim())
                .filter(e => e && e.includes('@'));

            const combinedEmails = [...new Set([...selectedEmails, ...manualEmails])];

            if (combinedEmails.length === 0) {
                statusEl.className = 'status-banner error';
                statusEl.textContent = '❌ No user emails selected. Select users from the list or add them manually.';
                return;
            }

            const confirm = window.confirm(
                `Are you sure you want to send this email to ${combinedEmails.length} users?\n\nSubject: ${subject}`
            );
            if (!confirm) return;

            sendBtn.disabled = true;
            sendBtn.innerHTML = '<svg class="spinner" viewBox="0 0 50 50" style="width:16px;height:16px;animation:spin 1s linear infinite;"><circle cx="25" cy="25" r="20" fill="none" stroke="currentColor" stroke-width="5" stroke-dasharray="31.4 31.4" stroke-linecap="round"></circle></svg> SENDING...';
            statusEl.className = 'status-banner loading';
            statusEl.textContent = `📤 Sending to ${combinedEmails.length} users...\nPlease do not close this window.`;

            try {
                let sent = 0;
                let failed = 0;
                let errors = [];

                for (let i = 0; i < combinedEmails.length; i++) {
                    const email = combinedEmails[i];
                    statusEl.textContent = `⏳ Sending: ${i + 1}/${combinedEmails.length} (Queuing to avoid limits...)`;

                    try {
                        const payload = {
                            service_id: 'service_cwwuy86',
                            template_id: 'template_nikgira',
                            user_id: 'frzivjqrgvnvXPMCg',
                            template_params: {
                                to_email: email,
                                subject: subject,
                                html: html
                            }
                        };

                        const response = await fetch('https://api.emailjs.com/api/v1.0/email/send', {
                            method: 'POST',
                            headers: {
                                'Content-Type': 'application/json',
                            },
                            body: JSON.stringify(payload)
                        });

                        if (response.ok || response.status === 200) {
                            sent++;
                        } else {
                            failed++;
                            const errorText = await response.text();
                            errors.push(`${email}: ${errorText}`);
                        }
                    } catch (e) {
                        failed++;
                        errors.push(`${email}: ${e.message}`);
                    }

                    // Small pause to avoid hitting EmailJS limits
                    if (i < combinedEmails.length - 1) {
                        await new Promise(r => setTimeout(r, 800));
                    }
                }

                statusEl.className = 'status-banner ' + (failed === 0 ? 'success' : 'error');
                statusEl.textContent = `✅ Done! Sent: ${sent}  |  Failed: ${failed}  |  Total: ${combinedEmails.length}`;
                if (errors.length > 0) {
                    statusEl.textContent += '\n\nFirst errors:\n' + errors.slice(0, 10).join('\n');
                }

            } catch (err) {
                statusEl.className = 'status-banner error';
                statusEl.textContent = `❌ System Error: ${err.message}`;
            } finally {
                sendBtn.disabled = false;
                sendBtn.innerHTML = `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="16" height="16"><line x1="22" y1="2" x2="11" y2="13"></line><polygon points="22 2 15 22 11 13 2 9 22 2"></polygon></svg> SEND EMAIL`;
            }
        });

    </script>
</body>

</html>
